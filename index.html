
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HYPERION HUB</title>
<style>
body{background:#000;color:#0ff;font-family:monospace;text-align:center;}
textarea{width:85%;height:150px;margin:10px;background:#050505;color:#0ff;border:1px solid #0ff;padding:10px;}
button{padding:12px 25px;background:#0ff;color:#000;border:none;cursor:pointer;font-weight:bold;}
h1{text-shadow:0 0 10px #0ff;}
</style>
</head>
<body>

<h1>HYPERION HUB</h1>

<textarea id="input" placeholder="Paste your Lua script..."></textarea><br>
<button onclick="obfuscate()">OBFUSCATE</button>
<textarea id="output" placeholder="Obfuscated code..." readonly></textarea>

<script>
async function obfuscate(){
  const code=document.getElementById("input").value;
  const res=await fetch("/api/obfuscate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({code})
  });
  const data=await res.json();
  document.getElementById("output").value=data.obfuscated||"Error!";
}
</script>

</body>
</html>
